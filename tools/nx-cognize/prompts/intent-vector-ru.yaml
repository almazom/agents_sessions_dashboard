id: intent-vector-ru
description: Semantic Russian intent ladder extracted only from user messages.
task_sentence: "Помоги быстро понять, о чем эта сессия, показав развитие намерений пользователя сверху вниз."
template: |
  Задача: __TASK_SENTENCE__
  Ты анализируешь только сообщения пользователя из session trace.
  Верни ровно один JSON объект и ничего больше.
  Не используй markdown fences.
  Не цитируй сообщения дословно, если можно сжать смысл.
  Игнорируй tool noise, subagent noise, системный шум, agent_id, status completed и служебные строки.
  Составь осмысленный вектор намерений пользователя сверху вниз.
  Поле summary должно быть одним коротким русским предложением, которое прямо описывает, чего пользователь хотел в этой сессии.
  Начни поле summary словами "Пользователь хочет ...".
  Не пиши общие фразы вроде "семантическая выжимка показывает".
  В summary предпочитай ожидаемый результат для пользователя, а не описание действий ассистента.
  Если есть и продуктовые цели, и вспомогательные шаги вроде docs, shell, тестов или таймаутов, в summary и первых шагах предпочитай продуктовые цели.
  Не выноси docs, AGENTS, MEMORY, shell, тесты или таймауты в intent_steps_ru, если в сессии есть более прямые пользовательские цели.
  Нужно вернуть от 3 до __MAX_BULLETS__ шагов.
  Каждый шаг должен быть дружелюбным русским текстом длиной до __MAX_WORDS_PER_BULLET__ слов.
  Каждый шаг должен быстро читаться глазами.
  Используй только пользовательские намерения, а не сообщения ассистента.
  One-shot example:
  {
    "source_messages": [
      "починить фильтр сегодня",
      "поднять latest наверх",
      "убрать лишние поля из карточки"
    ],
    "good_output": {
      "title": "Фильтр и latest карточка",
      "summary": "Пользователь хочет исправить фильтр, поднять latest и упростить карточку сессии.",
      "first_user_message": "починить фильтр сегодня",
      "last_user_message": "убрать лишние поля из карточки",
      "intent_steps_ru": [
        "починить фильтр сегодня",
        "поднять latest наверх",
        "убрать лишние поля"
      ],
      "key_topics": ["фильтр", "latest", "карточка"],
      "confidence": 0.84
    }
  }
  Two-shot example:
  {
    "source_messages": [
      "создать isolated cli для jsonl",
      "добавить контракт и manifest",
      "проверить playwright и deploy"
    ],
    "good_output": {
      "title": "CLI для JSONL сессий",
      "summary": "Пользователь хочет собрать отдельный CLI для JSONL и довести его до проверяемого состояния.",
      "first_user_message": "создать isolated cli для jsonl",
      "last_user_message": "проверить playwright и deploy",
      "intent_steps_ru": [
        "создать isolated cli",
        "добавить контракт и manifest",
        "проверить playwright и deploy"
      ],
      "key_topics": ["cli", "jsonl", "contracts"],
      "confidence": 0.86
    }
  }
  Three-shot example:
  {
    "source_messages": [
      "исправить фильтр сегодня",
      "точно находить latest session",
      "показывать полный путь файла",
      "улучшить карточку сессии intent bullets",
      "обновить docs и тесты"
    ],
    "good_output": {
      "title": "Навигация по AI-сессиям",
      "summary": "Пользователь хочет быстро находить нужную AI-сессию и сразу понимать её смысл.",
      "first_user_message": "исправить фильтр сегодня",
      "last_user_message": "обновить docs и тесты",
      "intent_steps_ru": [
        "исправить фильтр сегодня",
        "точно находить latest session",
        "показывать полный путь",
        "усилить карточку сессии"
      ],
      "key_topics": ["latest", "сессии", "карточка"],
      "confidence": 0.88
    }
  }
  JSON shape:
  {
    "title": "string",
    "summary": "string",
    "first_user_message": "string",
    "last_user_message": "string",
    "intent_steps_ru": ["string"],
    "key_topics": ["string"],
    "confidence": 0.0
  }

  Source packet:
  __SOURCE_PACKET_JSON__

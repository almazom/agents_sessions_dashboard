# Nginx config for Agent Nexus on port 80
# Install: sudo cp nginx-nexus.conf /etc/nginx/sites-available/nexus
# Enable: sudo ln -s /etc/nginx/sites-available/nexus /etc/nginx/sites-enabled/
# Reload: sudo nginx -s reload

server {
    listen 80;
    server_name 107.174.231.22;

    # Proxy to Nexus backend
    location / {
        proxy_pass http://127.0.0.1:18890;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }
}
